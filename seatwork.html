<html>
    <head>

    <meta charset="UTF-8">

    <title>Classmate System</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        background:#f5f5f5;
        font-family:Segoe UI;
    }

    .navbar{
        background:#FFD700;
    }

    .navbar-brand,
    .nav-link{
        color:black !important;
        font-weight:bold;
        transition:0.3s;
    }

    .nav-link:hover{
        transform:scale(1.08);
    }

    .card-custom{
        background:white;
        border-radius:15px;
        border:none;
    }

    .title{
        color:#d4a200;
        font-weight:bold;
    }

    .form-control{
        border:1px solid #ccc;
        padding:12px;
    }

    .form-control:focus{
        border-color:#FFD700;
        box-shadow:0 0 5px #FFD700;
    }

    .list-item{
        background:#fafafa;
        padding:15px;
        border-radius:10px;
        margin-bottom:10px;
        border-left:5px solid #FFD700;
        display:flex;
        justify-content:space-between;
        align-items:center;
        transition:0.3s;
    }

    .list-item:hover{
        transform:scale(1.03);
    }

    .student-name{
        color:#d4a200;
        font-weight:bold;
        font-size:18px;
    }

    .student-info{
        color:#555;
    }

    .delete-btn{
        background:red;
        color:white;
        border:none;
        padding:6px 10px;
        border-radius:6px;
        transition:0.3s;
    }

    .delete-btn:hover{
        transform:scale(1.1);
    }

    .btn{
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    </style>

    </head>

    <body>

    <nav class="navbar navbar-expand-lg px-4">

        <a class="navbar-brand">10 - Ruby</a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link active" href="seatwork.html">
                Classmates
            </a>

            <a class="nav-link" href="skillstest.html">
                Attendance
            </a>

            <a class="nav-link" href="project.html">
                Gallery
            </a>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="text-center mb-4">

            <h2 class="title">
                Classmate System
            </h2>

            <p class="text-muted">
                Manage your classmates easily
            </p>

        </div>

        <div class="card card-custom p-4 shadow">

            <input id="name"
            class="form-control mb-3"
            placeholder="Name">

            <input id="section"
            class="form-control mb-3"
            placeholder="Section">

            <input id="subject"
            class="form-control mb-3"
            placeholder="Favorite Subject">

            <div class="d-flex gap-2">

                <button py-click="add_classmate"
                class="btn btn-warning w-50">
                Add
                </button>

                <button py-click="show_classmates"
                class="btn btn-outline-warning w-50">
                Show
                </button>

            </div>

            <input id="search"
            class="form-control mt-3"
            placeholder="Search classmate..."
            py-keyup="search_classmates">

            <div id="message" class="mt-2"></div>

        </div>

        <div class="card card-custom mt-4 p-3 shadow">

            <h5 class="title">
                Classmate List
            </h5>

            <div id="output"></div>

        </div>

    </div>

    <py-script src="seatwork.py"></py-script>

    </body>
</html>
