<html>
    <head>

    <meta charset="UTF-8">

    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        background:#f5f5f5;
        font-family:Segoe UI;
    }

    .navbar{
        background:#FFD700;
    }

    .navbar-brand,
    .nav-link{
        color:black !important;
        font-weight:bold;
        transition:0.3s;
    }

    .nav-link:hover{
        transform:scale(1.08);
    }

    .box{
        background:white;
        border-radius:15px;
        padding:25px;
    }

    .record{
        background:#fafafa;
        border-left:5px solid #FFD700;
        padding:15px;
        border-radius:10px;
        margin-bottom:10px;
        transition:0.3s;
    }

    .record:hover{
        transform:scale(1.03);
    }

    .student-name{
        font-weight:bold;
        color:#d4a200;
        font-size:18px;
    }

    .status{
        font-weight:bold;
    }

    .present{
        color:green;
    }

    .absent{
        color:red;
    }

    .btn{
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    </style>

    </head>

    <body>

    <nav class="navbar navbar-expand-lg px-4">

        <a class="navbar-brand">10 - Ruby</a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="seatwork.html">
                Classmates
            </a>

            <a class="nav-link active" href="skillstest.html">
                Attendance
            </a>

            <a class="nav-link" href="project.html">
                Gallery
            </a>

        </div>

    </nav>

    <div class="container mt-5">

    <div class="row">

    <div class="col-md-4">

        <div class="box shadow">

            <h3 class="mb-4 text-center">
                Attendance Tracker
            </h3>

            <input type="text"
            id="name"
            class="form-control mb-3"
            placeholder="Student Name">

            <select id="day"
            class="form-control mb-3">

                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>

            </select>

            <select id="status"
            class="form-control mb-3">

                <option>Present</option>
                <option>Absent</option>

            </select>

            <button py-click="save_attendance"
            class="btn btn-warning w-100">
            Save Attendance
            </button>

            <div id="message" class="mt-3"></div>

        </div>

    </div>

    <div class="col-md-8">

        <div class="box shadow">

            <h4 class="mb-4">
                Attendance Records
            </h4>

            <div id="records"></div>

        </div>

    </div>

    </div>

    </div>

    <py-script src="skillstest.py"></py-script>

    </body>
</html>
